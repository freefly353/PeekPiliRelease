name: Windows版本 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: Win_v1.0.0)'
        required: true
        default: 'Win_v1.0.0'
      release_notes:
        description: '发布说明'
        required: false
        default: 'Windows新版本发布'
  push:
    tags:
      - 'w*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      # add by freefly353
      - name: 配置Win7环境
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: 安装依赖
        run: |
          cd nodejs
          npm install
          cd ../open
          npm install
          cd ../
      - name: 编译构建
        run: |
          cd nodejs
          ## npm run dev
          npm run build
          # ls -la dist/
          cd ../
      # add by freefly353
      - name: 程序打包
        run: |
          npx pkg nodejs/dist/index.js --targets node16-win-x64
      - name: 列出打包文件
        run: dir nodejs/dist   
      - name: 创建 Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            ## 🎉 新版本发布
            
            ${{ github.event.inputs.release_notes || '新版本发布' }}
            
            ## 📦 下载安装包
            
            请从下方 Assets 中下载对应平台的安装包。
            
            ## 📝 更新内容
            
            - 查看 [CHANGELOG.md](CHANGELOG.md) 了解详细更新内容
            
            ## ⚠️ 注意事项
            
            - 请根据您的设备平台选择合适的安装包
            - 安装前请备份重要数据
          draft: false
          prerelease: false
      
      - name: 上传 Release 文件
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/
          asset_name: release-assets.zip
          asset_content_type: application/zip
        continue-on-error: true
      
      - name: 上传单个文件
        run: |
          cd release
          for file in *; do
            if [ -f "$file" ]; then
              echo "上传文件: $file"
              curl -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Content-Type: $(file -b --mime-type "$file")" \
                --data-binary @"$file" \
                "${{ steps.create_release.outputs.upload_url }}?name=$file" || true
            fi
          done

